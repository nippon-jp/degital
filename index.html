<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Text AR Modeler - Mobile Optimized</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Inter', 'Noto Sans JP', sans-serif; background-color: #020617; color: #f8fafc; }
        canvas { display: block; }
        
        /* Glassmorphism Effect */
        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Responsive Panel Layout */
        .ui-panel {
            position: fixed;
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Mobile: Bottom Sheet */
        @media (max-width: 639px) {
            .ui-panel {
                bottom: 0;
                left: 0;
                width: 100%;
                border-radius: 24px 24px 0 0;
                max-height: 80vh;
                padding-bottom: env(safe-area-inset-bottom);
            }
            .ui-panel.collapsed {
                transform: translateY(calc(100% - 60px));
            }
        }

        /* Desktop: Floating Sidebar */
        @media (min-width: 640px) {
            .ui-panel {
                top: 20px;
                left: 20px;
                width: 340px;
                border-radius: 24px;
                max-height: calc(100vh - 40px);
            }
            .ui-panel.collapsed {
                transform: translateX(-360px);
            }
        }

        /* Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        /* UI Controls */
        input, select { background: #1e293b; color: white; border: 1px solid #334155; border-radius: 14px; padding: 12px; width: 100%; outline: none; font-size: 16px; }
        input[type="range"] { height: 8px; border-radius: 5px; appearance: none; background: #334155; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #6366f1; cursor: pointer; }

        #ar-button {
            position: fixed;
            bottom: 30px;
            right: 20px;
            z-index: 50;
            padding: 16px 24px;
            background: #ffffff;
            color: #000;
            border-radius: 9999px;
            font-weight: 800;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: none;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #ar-button:active { transform: scale(0.95); }

        .handle-bar {
            width: 40px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin: 0 auto 15px auto;
        }
    </style>
</head>
<body>

    <div id="loading" class="fixed inset-0 bg-slate-950 flex flex-col items-center justify-center z-[200]">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-500 border-t-transparent mb-4"></div>
        <p class="text-xs font-bold tracking-widest uppercase text-slate-400">Loading 3D Fonts...</p>
    </div>

    <!-- Toggle Button for Desktop -->
    <button onclick="toggleUI()" class="hidden sm:flex fixed top-5 left-5 z-[110] w-10 h-10 bg-indigo-600 rounded-full items-center justify-center shadow-lg text-white">
        <span id="desktop-toggle-icon">☰</span>
    </button>

    <div id="ui-container" class="ui-panel glass-panel overflow-hidden flex flex-col">
        <!-- Handle for Mobile -->
        <div class="sm:hidden pt-3 cursor-pointer" onclick="toggleUI()">
            <div class="handle-bar"></div>
        </div>

        <div class="px-6 pb-6 pt-2 sm:pt-6 overflow-y-auto custom-scroll flex-1">
            <div class="flex items-center justify-between mb-4">
                <h1 class="text-xl font-black bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400 tracking-tighter uppercase">AR Text Modeler</h1>
                <button onclick="toggleUI()" class="sm:hidden text-slate-400 text-xs font-bold uppercase tracking-widest">Close</button>
            </div>

            <!-- Create Section -->
            <div class="space-y-4 mb-6">
                <div class="space-y-3">
                    <input type="text" id="textInput" placeholder="Enter text..." maxlength="15" value="HELLO AR">
                    <div class="grid grid-cols-2 gap-2">
                        <select id="renderMode">
                            <option value="geometry">3D Geometry</option>
                            <option value="board">Billboard</option>
                        </select>
                        <button onclick="generateNew()" class="bg-indigo-600 p-3 rounded-xl text-xs font-bold text-white shadow-md active:scale-95 transition-transform">
                            Generate
                        </button>
                    </div>
                </div>
            </div>

            <!-- Edit Panel -->
            <div id="edit-panel" class="hidden space-y-5 animate-in fade-in slide-in-from-bottom-2 duration-300 border-t border-slate-800 pt-5">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Style</label>
                        <select id="stylePreset" onchange="applyPreset(this.value)">
                            <option value="custom">Custom</option>
                            <option value="neon">Neon</option>
                            <option value="metal">Metal</option>
                            <option value="glass">Glass</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Animation</label>
                        <select id="animSelect" onchange="updateAnimation(this.value)">
                            <option value="none">None</option>
                            <option value="rotate">Rotate</option>
                            <option value="float">Float</option>
                            <option value="pulse">Pulse</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Front Color</label>
                        <div class="flex items-center gap-2 bg-slate-900 p-2 rounded-xl border border-slate-800">
                            <input type="color" id="frontColorPicker" value="#ffffff" oninput="updateColors()" class="w-8 h-8 p-0 border-none bg-transparent cursor-pointer">
                            <span class="text-[10px] font-mono text-slate-400 uppercase">Color</span>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Side Color</label>
                        <div class="flex items-center gap-2 bg-slate-900 p-2 rounded-xl border border-slate-800">
                            <input type="color" id="sideColorPicker" value="#6366f1" oninput="updateColors()" class="w-8 h-8 p-0 border-none bg-transparent cursor-pointer">
                            <span class="text-[10px] font-mono text-slate-400 uppercase">Color</span>
                        </div>
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <div class="flex justify-between mb-1">
                            <label class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Global Scale</label>
                            <span id="scaleDisplay" class="text-[10px] font-bold text-indigo-400">1.0x</span>
                        </div>
                        <input type="range" id="scaleRange" min="0.1" max="3" step="0.1" value="1" oninput="updateScale(this.value)" class="w-full">
                    </div>
                    <div>
                        <div class="flex justify-between mb-1">
                            <label class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Text Depth</label>
                            <span id="depthDisplay" class="text-[10px] font-bold text-indigo-400">0.2x</span>
                        </div>
                        <input type="range" id="depthRange" min="0.01" max="1" step="0.01" value="0.2" oninput="updateDepth(this.value)" class="w-full">
                    </div>
                </div>

                <button onclick="clearScene()" class="w-full bg-slate-800/50 text-slate-400 py-3 rounded-xl text-[10px] font-bold tracking-widest uppercase border border-slate-700 hover:bg-slate-800">
                    Reset Scene
                </button>
            </div>
        </div>
    </div>

    <!-- Floating AR Button -->
    <button id="ar-button">Start AR</button>
    <div id="ar-status" class="fixed top-8 left-1/2 -translate-x-1/2 glass-panel px-6 py-2 rounded-full text-[10px] font-bold hidden z-[150] shadow-xl border border-indigo-500/50">Point to a flat surface...</div>

    <script>
        let scene, camera, renderer, controls, font;
        let objects = [];
        let selectedObject = null;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const clock = new THREE.Clock();
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let reticle;

        const fontLoader = new THREE.FontLoader();
        const fontUrl = 'https://threejs.org/examples/fonts/helvetiker_bold.typeface.json';

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020617);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);
            camera.position.set(1, 1, 1.5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.1;

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const pointLight = new THREE.PointLight(0xffffff, 1.5);
            pointLight.position.set(5, 5, 5);
            scene.add(pointLight);

            const grid = new THREE.GridHelper(10, 20, 0x1e293b, 0x0f172a);
            grid.name = "grid";
            scene.add(grid);

            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.1, 0.12, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x6366f1 })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            window.addEventListener('resize', onWindowResize);
            
            // Mouse & Touch events
            renderer.domElement.addEventListener('pointerdown', onPointerDown);

            // Check XR support
            if ('xr' in navigator) {
                navigator.xr.isSessionSupported('immersive-ar').then(supported => {
                    if (supported) {
                        const btn = document.getElementById('ar-button');
                        btn.style.display = 'block';
                        btn.onclick = startAR;
                    }
                });
            }

            // Preload Font
            fontLoader.load(fontUrl, (loadedFont) => {
                font = loadedFont;
                document.getElementById('loading').style.display = 'none';
                generateNew();
            });
        }

        function toggleUI() {
            const container = document.getElementById('ui-container');
            container.classList.toggle('collapsed');
            const icon = document.getElementById('desktop-toggle-icon');
            if(icon) icon.innerText = container.classList.contains('collapsed') ? '☰' : '✕';
        }

        function createTextGeometry(text, depth) {
            return new THREE.TextGeometry(text, {
                font: font,
                size: 0.3,
                height: depth,
                curveSegments: 12,
                bevelEnabled: true,
                bevelThickness: 0.02,
                bevelSize: 0.01,
                bevelOffset: 0,
                bevelSegments: 5
            });
        }

        function createBoardGeometry(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1024; canvas.height = 512;
            ctx.clearRect(0,0,1024,512);
            ctx.font = "Bold 160px sans-serif";
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.strokeStyle = "rgba(0,0,0,0.8)"; ctx.lineWidth = 15;
            ctx.strokeText(text, 512, 256);
            ctx.fillStyle = "white"; ctx.fillText(text, 512, 256);
            
            const tex = new THREE.CanvasTexture(canvas);
            const frontMat = new THREE.MeshStandardMaterial({ map: tex, transparent: true, side: THREE.DoubleSide });
            const sideMat = new THREE.MeshStandardMaterial({ color: 0x6366f1 });
            
            const textWidth = ctx.measureText(text).width / 500;
            const geo = new THREE.BoxGeometry(textWidth + 0.2, 0.5, 0.1);
            const mesh = new THREE.Mesh(geo, [sideMat, sideMat, sideMat, sideMat, frontMat, sideMat]);
            return mesh;
        }

        function generateNew() {
            clearScene();
            const textStr = document.getElementById('textInput').value || "AR";
            const mode = document.getElementById('renderMode').value;
            const depth = parseFloat(document.getElementById('depthRange').value);
            let mesh;

            if (mode === 'geometry' && font) {
                const geo = createTextGeometry(textStr, depth);
                geo.center();
                const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.5, roughness: 0.2 });
                mesh = new THREE.Mesh(geo, mat);
            } else {
                mesh = createBoardGeometry(textStr);
            }

            mesh.userData.type = mode;
            mesh.userData.animation = 'none';
            mesh.userData.baseY = 0.2;
            mesh.userData.savedScale = 1.0;
            mesh.position.set(0, 0.2, 0);

            scene.add(mesh);
            objects.push(mesh);
            selectObject(mesh);
        }

        function applyPreset(val) {
            if (!selectedObject) return;
            const mat = selectedObject.material;
            const mats = Array.isArray(mat) ? mat : [mat];
            mats.forEach(m => {
                switch(val) {
                    case 'neon':
                        m.emissive.set(m.color); m.emissiveIntensity = 1.2;
                        m.metalness = 0; m.roughness = 1; break;
                    case 'metal':
                        m.emissiveIntensity = 0; m.metalness = 1.0; m.roughness = 0.1; break;
                    case 'glass':
                        m.transparent = true; m.opacity = 0.5; m.metalness = 0.2; m.roughness = 0; break;
                    default:
                        m.emissiveIntensity = 0; m.opacity = 1.0; m.metalness = 0.5; m.roughness = 0.4;
                }
            });
        }

        function updateColors() {
            if (!selectedObject) return;
            const frontCol = document.getElementById('frontColorPicker').value;
            const sideCol = document.getElementById('sideColorPicker').value;
            if (Array.isArray(selectedObject.material)) {
                selectedObject.material[4].color.set(frontCol);
                [0,1,2,3,5].forEach(i => selectedObject.material[i].color.set(sideCol));
            } else {
                selectedObject.material.color.set(frontCol);
            }
        }

        function updateDepth(val) {
            if (!selectedObject) return;
            const d = parseFloat(val);
            const text = document.getElementById('textInput').value;
            if (selectedObject.userData.type === 'geometry') {
                const oldPos = selectedObject.position.clone();
                const oldMat = selectedObject.material;
                selectedObject.geometry.dispose();
                selectedObject.geometry = createTextGeometry(text, d);
                selectedObject.geometry.center();
                selectedObject.position.copy(oldPos);
            } else {
                selectedObject.scale.z = d * 5; 
            }
            document.getElementById('depthDisplay').innerText = d + 'x';
        }

        function updateScale(val) {
            if (!selectedObject) return;
            const s = parseFloat(val);
            selectedObject.userData.savedScale = s;
            selectedObject.scale.set(s, s, selectedObject.scale.z);
            document.getElementById('scaleDisplay').innerText = s.toFixed(1) + 'x';
        }

        function updateAnimation(val) {
            if (!selectedObject) return;
            selectedObject.userData.animation = val;
            if (val === 'none') selectedObject.rotation.set(0, 0, 0);
        }

        function onPointerDown(e) {
            if (renderer.xr.isPresenting) return;
            // Raycasting logic
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objects, true);
            if (intersects.length > 0) {
                let t = intersects[0].object;
                while(t.parent && !objects.includes(t)) t = t.parent;
                selectObject(t);
            }
        }

        function selectObject(obj) {
            if (selectedObject) deselectObject();
            selectedObject = obj;
            document.getElementById('edit-panel').classList.remove('hidden');
            
            // Sync UI
            document.getElementById('animSelect').value = obj.userData.animation;
            document.getElementById('scaleRange').value = obj.userData.savedScale;
            document.getElementById('scaleDisplay').innerText = obj.userData.savedScale.toFixed(1) + 'x';
            
            const helper = new THREE.LineSegments(
                new THREE.EdgesGeometry(obj.geometry), 
                new THREE.LineBasicMaterial({ color: 0x6366f1 })
            );
            helper.name = "outline";
            obj.add(helper);
        }

        function deselectObject() {
            if (selectedObject) {
                const h = selectedObject.getObjectByName("outline");
                if (h) selectedObject.remove(h);
            }
            selectedObject = null;
            document.getElementById('edit-panel').classList.add('hidden');
        }

        function clearScene() {
            objects.forEach(o => {
                if(o.geometry) o.geometry.dispose();
                if(Array.isArray(o.material)) o.material.forEach(m => m.dispose());
                else if(o.material) o.material.dispose();
                scene.remove(o);
            });
            objects = [];
            deselectObject();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        async function startAR() {
            const session = await navigator.xr.requestSession('immersive-ar', { requiredFeatures: ['hit-test', 'local-floor'] });
            renderer.xr.setReferenceSpaceType('local-floor');
            await renderer.xr.setSession(session);
            
            document.getElementById('ui-container').style.opacity = '0';
            document.getElementById('ar-status').style.display = 'block';
            scene.getObjectByName("grid").visible = false;
            
            session.addEventListener('end', () => {
                document.getElementById('ui-container').style.opacity = '1';
                document.getElementById('ar-status').style.display = 'none';
                scene.getObjectByName("grid").visible = true;
                hitTestSourceRequested = false;
                hitTestSource = null;
            });
            
            session.addEventListener('select', () => {
                if (reticle.visible && selectedObject) {
                    const pos = new THREE.Vector3();
                    reticle.matrix.decompose(pos, new THREE.Quaternion(), new THREE.Vector3());
                    selectedObject.position.x = pos.x;
                    selectedObject.position.z = pos.z;
                }
            });
        }

        function animate() {
            renderer.setAnimationLoop((timestamp, frame) => {
                const time = clock.getElapsedTime();
                objects.forEach(obj => {
                    const anim = obj.userData.animation;
                    const baseS = obj.userData.savedScale || 1.0;
                    if (anim === 'rotate') obj.rotation.y += 0.02;
                    else if (anim === 'float') obj.position.y = obj.userData.baseY + Math.sin(time * 2) * 0.1 * obj.scale.y;
                    else if (anim === 'pulse') {
                        const s = baseS + Math.sin(time * 5) * 0.1 * baseS;
                        obj.scale.set(s, s, obj.scale.z);
                    }
                });
                
                if (frame) {
                    const session = renderer.xr.getSession();
                    const rs = renderer.xr.getReferenceSpace();
                    if (!hitTestSourceRequested) {
                        session.requestReferenceSpace('viewer').then(ref => session.requestHitTestSource({ space: ref }).then(s => hitTestSource = s));
                        hitTestSourceRequested = true;
                    }
                    if (hitTestSource) {
                        const results = frame.getHitTestResults(hitTestSource);
                        if (results.length) {
                            reticle.visible = true;
                            reticle.matrix.fromArray(results[0].getPose(rs).transform.matrix);
                            document.getElementById('ar-status').innerText = "Tap to move text";
                        } else {
                            reticle.visible = false;
                            document.getElementById('ar-status').innerText = "Scanning surface...";
                        }
                    }
                }
                controls.update();
                renderer.render(scene, camera);
            });
        }
    </script>
</body>
</html>
