<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARテキストモデラー - 日本語対応版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FontLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/geometries/TextGeometry.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background-color: #020617; color: #f8fafc; }
        canvas { display: block; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ui-panel {
            position: fixed;
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (max-width: 639px) {
            .ui-panel {
                bottom: 0;
                left: 0;
                width: 100%;
                border-radius: 24px 24px 0 0;
                max-height: 85vh;
                padding-bottom: env(safe-area-inset-bottom);
            }
            .ui-panel.collapsed {
                transform: translateY(calc(100% - 60px));
            }
        }

        @media (min-width: 640px) {
            .ui-panel {
                top: 20px;
                left: 20px;
                width: 340px;
                border-radius: 24px;
                max-height: calc(100vh - 40px);
            }
            .ui-panel.collapsed {
                transform: translateX(-360px);
            }
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        input, select { background: #1e293b; color: white; border: 1px solid #334155; border-radius: 14px; padding: 12px; width: 100%; outline: none; font-size: 16px; }
        input:focus { border-color: #6366f1; }
        input[type="range"] { height: 8px; border-radius: 5px; appearance: none; background: #334155; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #6366f1; cursor: pointer; border: 2px solid white; }

        #ar-button {
            position: fixed;
            bottom: 30px;
            right: 20px;
            z-index: 50;
            padding: 18px 28px;
            background: #ffffff;
            color: #000;
            border-radius: 9999px;
            font-weight: 800;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            display: none;
            border: none;
            cursor: pointer;
        }

        .handle-bar {
            width: 45px;
            height: 5px;
            background: rgba(255,255,255,0.25);
            border-radius: 10px;
            margin: 0 auto 15px auto;
        }
    </style>
</head>
<body>

    <div id="loading" class="fixed inset-0 bg-slate-950 flex flex-col items-center justify-center z-[200]">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-500 border-t-transparent mb-4"></div>
        <p class="text-sm font-bold tracking-widest text-slate-400">システムを準備中...</p>
    </div>

    <button onclick="toggleUI()" class="hidden sm:flex fixed top-5 left-5 z-[110] w-12 h-12 bg-indigo-600 rounded-full items-center justify-center shadow-xl text-white">
        <span id="desktop-toggle-icon">✕</span>
    </button>

    <div id="ui-container" class="ui-panel glass-panel overflow-hidden flex flex-col shadow-2xl">
        <div class="sm:hidden pt-4 cursor-pointer" onclick="toggleUI()">
            <div class="handle-bar"></div>
        </div>

        <div class="px-6 pb-8 pt-2 sm:pt-6 overflow-y-auto custom-scroll flex-1">
            <div class="flex items-center justify-between mb-2">
                <h1 class="text-xl font-black bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400 tracking-tighter uppercase">ARテキスト</h1>
                <button onclick="toggleUI()" class="sm:hidden text-slate-400 text-xs font-bold bg-slate-800 px-3 py-1 rounded-full">閉じる</button>
            </div>
            
            <div class="bg-indigo-500/10 border border-indigo-500/20 rounded-xl p-3 mb-6">
                <p class="text-[10px] text-indigo-300 leading-relaxed font-bold">
                    <span class="text-indigo-400">💡 日本語をご使用の方へ：</span><br>
                    日本語は「パネル文字」モードで立体的に表示されます。英数字は「3D立体文字」も選択可能です。
                </p>
            </div>

            <div class="space-y-4 mb-8">
                <div class="space-y-3">
                    <label class="text-[10px] text-indigo-400 font-bold uppercase tracking-wider">テキスト入力</label>
                    <input type="text" id="textInput" placeholder="文字を入力..." maxlength="15" value="こんにちは">
                    <div class="grid grid-cols-2 gap-2">
                        <select id="renderMode" onchange="checkMode()">
                            <option value="board">パネル文字 (日本語推奨)</option>
                            <option value="geometry">3D立体文字 (英数字用)</option>
                        </select>
                        <button onclick="generateNew()" class="bg-indigo-600 p-3 rounded-xl text-xs font-bold text-white shadow-lg active:bg-indigo-700 transition-all">
                            更新
                        </button>
                    </div>
                </div>
            </div>

            <div id="edit-panel" class="hidden space-y-6 animate-in fade-in slide-in-from-bottom-3 duration-500 border-t border-slate-800 pt-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">プリセット</label>
                        <select id="stylePreset" onchange="applyPreset(this.value)">
                            <option value="custom">カスタム</option>
                            <option value="neon">ネオン</option>
                            <option value="metal">メタル</option>
                            <option value="glass">ガラス</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">動作</label>
                        <select id="animSelect" onchange="updateAnimation(this.value)">
                            <option value="none">静止</option>
                            <option value="rotate">回転</option>
                            <option value="float">浮遊</option>
                            <option value="pulse">脈動</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">表面カラー</label>
                        <div class="flex items-center gap-2 bg-slate-900/50 p-2 rounded-xl border border-slate-800">
                            <input type="color" id="frontColorPicker" value="#ffffff" oninput="updateColors()" class="w-10 h-10 p-0 border-none bg-transparent cursor-pointer">
                            <span class="text-[10px] font-mono text-slate-500 uppercase">FRONT</span>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">側面カラー</label>
                        <div class="flex items-center gap-2 bg-slate-900/50 p-2 rounded-xl border border-slate-800">
                            <input type="color" id="sideColorPicker" value="#6366f1" oninput="updateColors()" class="w-10 h-10 p-0 border-none bg-transparent cursor-pointer">
                            <span class="text-[10px] font-mono text-slate-500 uppercase">SIDE</span>
                        </div>
                    </div>
                </div>

                <div class="space-y-5">
                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">サイズ</label>
                            <span id="scaleDisplay" class="text-xs font-bold text-indigo-400">1.0x</span>
                        </div>
                        <input type="range" id="scaleRange" min="0.1" max="4" step="0.1" value="1" oninput="updateScale(this.value)" class="w-full">
                    </div>
                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">奥行き（厚み）</label>
                            <span id="depthDisplay" class="text-xs font-bold text-indigo-400">0.2x</span>
                        </div>
                        <input type="range" id="depthRange" min="0.01" max="1.5" step="0.01" value="0.2" oninput="updateDepth(this.value)" class="w-full">
                    </div>
                </div>

                <button onclick="clearScene()" class="w-full bg-slate-800/80 text-slate-400 py-3 rounded-xl text-[10px] font-black tracking-widest uppercase border border-slate-700 hover:text-white transition-colors">
                    すべてクリア
                </button>
            </div>
        </div>
    </div>

    <button id="ar-button">ARを開始</button>
    <div id="ar-status" class="fixed top-12 left-1/2 -translate-x-1/2 glass-panel px-8 py-3 rounded-full text-xs font-bold hidden z-[150] shadow-2xl border border-indigo-500/50 text-indigo-100 text-center">平面を認識させてください</div>

    <script>
        let scene, camera, renderer, controls, font;
        let objects = [];
        let selectedObject = null;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const clock = new THREE.Clock();
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let reticle;

        const fontLoader = new THREE.FontLoader();
        const fontUrl = 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/fonts/helvetiker_bold.typeface.json';

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020617);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);
            camera.position.set(0, 1, 2);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.1;
            controls.target.set(0, 0.5, 0);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const pointLight = new THREE.PointLight(0xffffff, 1.5);
            pointLight.position.set(5, 10, 5);
            scene.add(pointLight);

            const grid = new THREE.GridHelper(10, 20, 0x1e293b, 0x0f172a);
            grid.name = "grid";
            scene.add(grid);

            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.1, 0.12, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x6366f1 })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('pointerdown', onPointerDown);

            if ('xr' in navigator) {
                navigator.xr.isSessionSupported('immersive-ar').then(supported => {
                    if (supported) {
                        const btn = document.getElementById('ar-button');
                        btn.style.display = 'block';
                        btn.onclick = startAR;
                    }
                });
            }

            fontLoader.load(fontUrl, (loadedFont) => {
                font = loadedFont;
                document.getElementById('loading').style.display = 'none';
                generateNew();
            }, undefined, (err) => {
                document.getElementById('loading').style.display = 'none';
                generateNew(); 
            });
        }

        function checkMode() {
            const text = document.getElementById('textInput').value;
            const mode = document.getElementById('renderMode').value;
            // 日本語が含まれているのにGeometryモードを選んだ場合警告（コンソールのみ）
            if (/[^\x00-\x7F]/.test(text) && mode === 'geometry') {
                console.warn("Japanese characters may not render in geometry mode.");
            }
        }

        function toggleUI() {
            const container = document.getElementById('ui-container');
            container.classList.toggle('collapsed');
            const icon = document.getElementById('desktop-toggle-icon');
            if(icon) icon.innerText = container.classList.contains('collapsed') ? '☰' : '✕';
        }

        function fixGeometryPivot(geometry) {
            geometry.computeBoundingBox();
            const bbox = geometry.boundingBox;
            const xOffset = - (bbox.max.x + bbox.min.x) / 2;
            const yOffset = - bbox.min.y; 
            const zOffset = - (bbox.max.z + bbox.min.z) / 2;
            geometry.translate(xOffset, yOffset, zOffset);
        }

        function createTextGeometry(text, depth) {
            if(!text) text = "AR";
            const geo = new THREE.TextGeometry(text, {
                font: font,
                size: 0.3,
                height: depth,
                curveSegments: 12,
                bevelEnabled: true,
                bevelThickness: 0.02,
                bevelSize: 0.01,
                bevelOffset: 0,
                bevelSegments: 5
            });
            fixGeometryPivot(geo);
            return geo;
        }

        function createBoardGeometry(text, depthValue) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1024; canvas.height = 512;
            
            // 背景は透明
            ctx.clearRect(0,0,1024,512);
            
            // 日本語対応フォント設定
            ctx.font = "Bold 160px 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif";
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            
            // 縁取り（3D感を出すため）
            ctx.strokeStyle = "rgba(0,0,0,0.8)"; ctx.lineWidth = 18;
            ctx.strokeText(text, 512, 256);
            
            // 文字本体
            ctx.fillStyle = "white"; ctx.fillText(text, 512, 256);
            
            const tex = new THREE.CanvasTexture(canvas);
            tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
            
            const frontMat = new THREE.MeshStandardMaterial({ 
                map: tex, 
                transparent: true, 
                side: THREE.DoubleSide,
                metalness: 0.5,
                roughness: 0.2
            });
            
            const sideMat = new THREE.MeshStandardMaterial({ 
                color: document.getElementById('sideColorPicker').value,
                metalness: 0.7,
                roughness: 0.1
            });
            
            // 文字の長さに合わせて横幅を調整
            const textMetrics = ctx.measureText(text);
            const textWidth = Math.max(0.6, (textMetrics.width / 400));
            
            // 厚みを直接反映
            const geo = new THREE.BoxGeometry(textWidth, 0.5, depthValue);
            fixGeometryPivot(geo);
            
            const mesh = new THREE.Mesh(geo, [sideMat, sideMat, sideMat, sideMat, frontMat, sideMat]);
            return mesh;
        }

        function generateNew() {
            clearScene();
            
            const textStr = document.getElementById('textInput').value || "AR";
            const mode = document.getElementById('renderMode').value;
            const depth = parseFloat(document.getElementById('depthRange').value);
            
            // 日本語が含まれている場合は強制的にboardモードを勧めるが、選択は尊重
            let actualMode = mode;
            if (/[^\x00-\x7F]/.test(textStr) && mode === 'geometry') {
                actualMode = 'board';
                document.getElementById('renderMode').value = 'board';
            }

            let mesh;
            try {
                if (actualMode === 'geometry' && font) {
                    const geo = createTextGeometry(textStr, depth);
                    const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.5, roughness: 0.2 });
                    mesh = new THREE.Mesh(geo, mat);
                } else {
                    mesh = createBoardGeometry(textStr, depth);
                }

                mesh.userData.type = actualMode;
                mesh.userData.animation = 'none';
                mesh.userData.baseY = 0;
                mesh.userData.savedScale = 1.0;
                mesh.position.set(0, 0, 0);

                scene.add(mesh);
                objects.push(mesh);
                selectObject(mesh);
                
                // 初回のみ現在の色を適用
                updateColors();
            } catch (e) {
                console.error("生成エラー:", e);
            }
        }

        function applyPreset(val) {
            if (!selectedObject) return;
            const mat = selectedObject.material;
            const mats = Array.isArray(mat) ? mat : [mat];
            mats.forEach(m => {
                switch(val) {
                    case 'neon':
                        m.emissive.set(m.color); m.emissiveIntensity = 1.5;
                        m.metalness = 0; m.roughness = 1; break;
                    case 'metal':
                        m.emissiveIntensity = 0; m.metalness = 1.0; m.roughness = 0.1; break;
                    case 'glass':
                        m.transparent = true; m.opacity = 0.45; m.metalness = 0.2; m.roughness = 0; break;
                    default:
                        m.emissiveIntensity = 0; m.opacity = 1.0; m.metalness = 0.5; m.roughness = 0.4;
                }
            });
        }

        function updateColors() {
            if (!selectedObject) return;
            const frontCol = document.getElementById('frontColorPicker').value;
            const sideCol = document.getElementById('sideColorPicker').value;
            if (Array.isArray(selectedObject.material)) {
                selectedObject.material[4].color.set(frontCol);
                [0,1,2,3,5].forEach(i => selectedObject.material[i].color.set(sideCol));
            } else {
                selectedObject.material.color.set(frontCol);
            }
        }

        function updateDepth(val) {
            if (!selectedObject) return;
            const d = parseFloat(val);
            const text = document.getElementById('textInput').value;
            document.getElementById('depthDisplay').innerText = d + 'x';
            
            // 再生成して反映（ピボット調整のため）
            const oldPos = selectedObject.position.clone();
            const oldRot = selectedObject.rotation.clone();
            const oldAnim = selectedObject.userData.animation;
            const oldScale = selectedObject.userData.savedScale;
            
            generateNew();
            
            if(selectedObject) {
                selectedObject.position.copy(oldPos);
                selectedObject.rotation.copy(oldRot);
                selectedObject.userData.animation = oldAnim;
                selectedObject.userData.savedScale = oldScale;
                updateScale(oldScale);
                document.getElementById('animSelect').value = oldAnim;
            }
        }

        function updateScale(val) {
            if (!selectedObject) return;
            const s = parseFloat(val);
            selectedObject.userData.savedScale = s;
            selectedObject.scale.set(s, s, selectedObject.scale.z);
            document.getElementById('scaleDisplay').innerText = s.toFixed(1) + 'x';
        }

        function updateAnimation(val) {
            if (!selectedObject) return;
            selectedObject.userData.animation = val;
            if (val === 'none') {
                selectedObject.rotation.set(0, 0, 0);
                selectedObject.position.y = 0;
            }
        }

        function onPointerDown(e) {
            if (renderer.xr.isPresenting) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objects, true);
            if (intersects.length > 0) {
                let t = intersects[0].object;
                while(t.parent && !objects.includes(t)) t = t.parent;
                selectObject(t);
            }
        }

        function selectObject(obj) {
            if (selectedObject) deselectObject();
            selectedObject = obj;
            document.getElementById('edit-panel').classList.remove('hidden');
            
            const helper = new THREE.LineSegments(
                new THREE.EdgesGeometry(obj.geometry), 
                new THREE.LineBasicMaterial({ color: 0x6366f1, linewidth: 2 })
            );
            helper.name = "outline";
            obj.add(helper);
        }

        function deselectObject() {
            if (selectedObject) {
                const h = selectedObject.getObjectByName("outline");
                if (h) selectedObject.remove(h);
            }
            selectedObject = null;
            document.getElementById('edit-panel').classList.add('hidden');
        }

        function clearScene() {
            objects.forEach(o => {
                if(o.geometry) o.geometry.dispose();
                if(Array.isArray(o.material)) o.material.forEach(m => m.dispose());
                else if(o.material) o.material.dispose();
                scene.remove(o);
            });
            objects = [];
            deselectObject();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        async function startAR() {
            const session = await navigator.xr.requestSession('immersive-ar', { requiredFeatures: ['hit-test', 'local-floor'] });
            renderer.xr.setReferenceSpaceType('local-floor');
            await renderer.xr.setSession(session);
            
            document.getElementById('ui-container').style.opacity = '0';
            document.getElementById('ar-status').style.display = 'block';
            scene.getObjectByName("grid").visible = false;
            
            session.addEventListener('end', () => {
                document.getElementById('ui-container').style.opacity = '1';
                document.getElementById('ar-status').style.display = 'none';
                scene.getObjectByName("grid").visible = true;
                hitTestSourceRequested = false;
                hitTestSource = null;
            });
            
            session.addEventListener('select', () => {
                if (reticle.visible && selectedObject) {
                    const pos = new THREE.Vector3();
                    reticle.matrix.decompose(pos, new THREE.Quaternion(), new THREE.Vector3());
                    selectedObject.position.x = pos.x;
                    selectedObject.position.z = pos.z;
                    if (selectedObject.userData.animation === 'none') selectedObject.position.y = 0;
                }
            });
        }

        function animate() {
            renderer.setAnimationLoop((timestamp, frame) => {
                const time = clock.getElapsedTime();
                objects.forEach(obj => {
                    const anim = obj.userData.animation;
                    const baseS = obj.userData.savedScale || 1.0;
                    if (anim === 'rotate') obj.rotation.y += 0.02;
                    else if (anim === 'float') obj.position.y = (Math.sin(time * 2) * 0.1 + 0.1) * obj.scale.y;
                    else if (anim === 'pulse') {
                        const s = baseS + Math.sin(time * 5) * 0.1 * baseS;
                        obj.scale.set(s, s, obj.scale.z);
                    }
                });
                
                if (frame) {
                    const session = renderer.xr.getSession();
                    const rs = renderer.xr.getReferenceSpace();
                    if (!hitTestSourceRequested) {
                        session.requestReferenceSpace('viewer').then(ref => session.requestHitTestSource({ space: ref }).then(s => hitTestSource = s));
                        hitTestSourceRequested = true;
                    }
                    if (hitTestSource) {
                        const results = frame.getHitTestResults(hitTestSource);
                        if (results.length) {
                            reticle.visible = true;
                            reticle.matrix.fromArray(results[0].getPose(rs).transform.matrix);
                            document.getElementById('ar-status').innerText = "タップして文字を配置";
                        } else {
                            reticle.visible = false;
                            document.getElementById('ar-status').innerText = "平面を探しています...";
                        }
                    }
                }
                controls.update();
                renderer.render(scene, camera);
            });
        }
    </script>
</body>
</html>
