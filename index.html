<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TEXT AR STUDIO - 自動起動強化版</title>
<style>
  :root {
    --bg: #0a0a0f;
    --panel: rgba(10, 10, 20, 0.85);
    --border: rgba(100, 180, 255, 0.25);
    --accent: #4af;
    --accent-glow: rgba(68, 170, 255, 0.5);
    --text: #e8eaf0;
    --sub: #94a3b8;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    overflow: hidden;
    height: 100dvh;
    width: 100vw;
  }

  #three-canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: auto;
  }

  /* ARビデオ背景 */
  #ar-video {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    display: none;
    background: #000;
  }

  /* ローディング兼スタート画面 */
  #overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }

  .loader-ring {
    width: 60px; height: 60px;
    border: 3px solid rgba(68,170,255,0.1);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #start-btn {
    display: none; /* 読み込み完了後に表示 */
    background: linear-gradient(135deg, var(--accent), #6366f1);
    color: white;
    border: none;
    padding: 18px 48px;
    border-radius: 40px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 20px var(--accent-glow);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { transform: scale(1); box-shadow: 0 0 20px var(--accent-glow); }
    50% { transform: scale(1.05); box-shadow: 0 0 40px var(--accent-glow); }
    100% { transform: scale(1); box-shadow: 0 0 20px var(--accent-glow); }
  }

  /* コントロールパネル */
  #panel {
    position: fixed;
    right: 16px; top: 16px; bottom: 16px;
    width: 320px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    backdrop-filter: blur(24px);
    overflow-y: auto;
    z-index: 10;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
    transform: translateX(calc(100% + 32px));
  }
  #panel.open { transform: translateX(0); }

  .panel-title {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
  }

  .field-label { font-size: 11px; color: var(--sub); margin-bottom: 8px; display: block; }

  textarea, select, input[type=range] {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 12px;
    font-family: inherit;
    outline: none;
  }
  textarea { height: 70px; resize: none; }

  /* ARトグル */
  #toggle-panel {
    position: fixed;
    bottom: 24px; right: 24px;
    width: 56px; height: 56px;
    background: var(--accent);
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 24px;
    z-index: 20;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    display: flex; align-items: center; justify-content: center;
  }

  #status {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 12px;
    z-index: 5;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  @media (max-width: 640px) {
    #panel { width: calc(100% - 32px); left: 16px; right: 16px; }
  }
</style>
</head>
<body>

<!-- カメラ背景 -->
<video id="ar-video" autoplay playsinline muted></video>

<!-- 初期オーバーレイ（自動起動のためのユーザーアクション待ち） -->
<div id="overlay">
  <div id="loader-content">
    <div class="loader-ring"></div>
    <p style="margin-top:16px; font-size:14px; color:var(--sub)">LOADING ENGINE...</p>
  </div>
  <button id="start-btn">EXPERIENCE AR</button>
  <p id="start-hint" style="display:none; font-size:12px; color:var(--sub)">タップしてARカメラとセンサーを起動</p>
</div>

<canvas id="three-canvas"></canvas>

<button id="toggle-panel">⚙</button>

<div id="panel">
  <div class="panel-title">TEXT SETTINGS</div>
  
  <div class="field">
    <label class="field-label">表示テキスト</label>
    <textarea id="text-input">HELLO AR</textarea>
  </div>

  <div class="field">
    <label class="field-label">フォント</label>
    <select id="font-select">
      <option value="zenold" selected>Zen Old Mincho (明朝)</option>
      <option value="dela">Dela Gothic One (極太)</option>
      <option value="dotgothic">DotGothic16 (ドット)</option>
      <option value="mplusrounded">M PLUS Rounded (丸ゴ)</option>
    </select>
  </div>

  <div class="panel-title">TRANSFORM</div>
  
  <div class="field">
    <label class="field-label">スケール</label>
    <input type="range" id="scale" min="0.05" max="1" step="0.01" value="0.15">
  </div>

  <div class="panel-title">STYLE & ANIMATION</div>

  <div class="field">
    <label class="field-label">質感</label>
    <div class="preset-grid">
      <button class="btn active" data-mat="neon">NEON</button>
      <button class="btn" data-mat="metal">METAL</button>
      <button class="btn" data-mat="crystal">GLASS</button>
      <button class="btn" data-mat="standard">BASIC</button>
    </div>
  </div>

  <div class="field">
    <label class="field-label">アニメーション</label>
    <div class="preset-grid">
      <button class="btn active" data-anim="rotate">ROTATE</button>
      <button class="btn" data-anim="float">FLOAT</button>
      <button class="btn" data-anim="pulse">PULSE</button>
      <button class="btn" data-anim="none">NONE</button>
    </div>
  </div>

  <div class="field">
    <label class="field-label">メインカラー</label>
    <input type="color" id="color-front" value="#00ffff" style="height:40px; border:none; padding:2px;">
  </div>
</div>

<div id="status">Ready</div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/opentype.js@latest/dist/opentype.min.js"></script>

<script>
/**
 * TEXT AR STUDIO - CORE LOGIC
 */
let scene, camera, renderer, textGroup;
let opentypeFont = null;
let fontCache = {};
let arStream = null;
let clock = new THREE.Clock();
let animMode = 'rotate';
let matMode = 'neon';
let gyro = { alpha: 0, beta: 0, gamma: 0 };
let isGyroEnabled = false;

// フォントURL定義
const FONT_DEFS = {
  zenold: 'https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/zenoldmincho/ZenOldMincho-Regular.ttf',
  dela: 'https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/delagothicone/DelaGothicOne-Regular.ttf',
  dotgothic: 'https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/dotgothic16/DotGothic16-Regular.ttf',
  mplusrounded: 'https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/mplusrounded1c/MPLUSRounded1c-Regular.ttf'
};

/**
 * 初期化：Three.js
 */
function initEngine() {
  const canvas = document.getElementById('three-canvas');
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0); // 常に透過

  scene = new THREE.Scene();
  
  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);
  camera.position.set(0, 0, 2);

  const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(ambientLight);

  const pointLight = new THREE.PointLight(0xffffff, 1);
  pointLight.position.set(5, 5, 5);
  scene.add(pointLight);

  textGroup = new THREE.Group();
  scene.add(textGroup);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

/**
 * AR起動：カメラとジャイロ
 */
async function startARSystem() {
  const video = document.getElementById('ar-video');
  const status = document.getElementById('status');

  // 1. カメラ起動
  try {
    arStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = arStream;
    video.style.display = 'block';
    status.textContent = "Camera Active";
  } catch (err) {
    console.error("Camera Error:", err);
    status.textContent = "Camera Error: " + err.message;
  }

  // 2. ジャイロ（iOS対応）
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const permission = await DeviceOrientationEvent.requestPermission();
      if (permission === 'granted') {
        window.addEventListener('deviceorientation', (e) => {
          gyro.alpha = e.alpha; gyro.beta = e.beta; gyro.gamma = e.gamma;
        });
        isGyroEnabled = true;
      }
    } catch (e) { console.error("Gyro Permission Denied"); }
  } else {
    window.addEventListener('deviceorientation', (e) => {
      gyro.alpha = e.alpha; gyro.beta = e.beta; gyro.gamma = e.gamma;
    });
    isGyroEnabled = true;
  }

  // 3. UIの非表示
  document.getElementById('overlay').classList.add('hidden');
}

/**
 * 3Dテキスト生成
 */
async function updateText() {
  if (!opentypeFont) return;

  const text = document.getElementById('text-input').value || "AR";
  const scaleValue = parseFloat(document.getElementById('scale').value);
  const color = document.getElementById('color-front').value;

  // 古いメッシュの削除
  while(textGroup.children.length > 0) {
    const obj = textGroup.children[0];
    obj.geometry.dispose();
    if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
    else obj.material.dispose();
    textGroup.remove(obj);
  }

  try {
    const fontSize = 1;
    const path = opentypeFont.getPath(text, 0, 0, fontSize);
    const shapes = transformPathToShapes(path);

    const extrudeSettings = {
      depth: 0.2,
      bevelEnabled: true,
      bevelThickness: 0.05,
      bevelSize: 0.02,
      bevelSegments: 3
    };

    const geometry = new THREE.ExtrudeGeometry(shapes, extrudeSettings);
    geometry.computeBoundingBox();
    const center = new THREE.Vector3();
    geometry.boundingBox.getCenter(center);
    geometry.translate(-center.x, -center.y, -center.z);

    const material = createMaterial(color, matMode);
    const mesh = new THREE.Mesh(geometry, material);
    
    textGroup.add(mesh);
    textGroup.scale.setScalar(scaleValue);
  } catch (e) {
    console.error("Text Generation Error:", e);
  }
}

/**
 * opentype.js のパスを THREE.Shape に変換 (簡易版)
 */
function transformPathToShapes(opentypePath) {
  const shapes = [];
  let shape = null;

  opentypePath.commands.forEach(cmd => {
    switch(cmd.type) {
      case 'M':
        shape = new THREE.Shape();
        shape.moveTo(cmd.x, -cmd.y);
        shapes.push(shape);
        break;
      case 'L':
        shape.lineTo(cmd.x, -cmd.y);
        break;
      case 'Q':
        shape.quadraticCurveTo(cmd.x1, -cmd.y1, cmd.x, -cmd.y);
        break;
      case 'C':
        shape.bezierCurveTo(cmd.x1, -cmd.y1, cmd.x2, -cmd.y2, cmd.x, -cmd.y);
        break;
      case 'Z':
        if(shape) shape.closePath();
        break;
    }
  });
  return shapes;
}

/**
 * マテリアル作成
 */
function createMaterial(colorHex, mode) {
  const col = new THREE.Color(colorHex);
  switch(mode) {
    case 'neon':
      return new THREE.MeshStandardMaterial({ 
        color: col, emissive: col, emissiveIntensity: 1, roughness: 0.1, metalness: 0.5 
      });
    case 'metal':
      return new THREE.MeshStandardMaterial({ 
        color: col, roughness: 0.1, metalness: 1.0 
      });
    case 'crystal':
      return new THREE.MeshPhysicalMaterial({ 
        color: col, transmission: 0.9, thickness: 0.5, roughness: 0.05, ior: 1.5, transparent: true, opacity: 0.6
      });
    default:
      return new THREE.MeshStandardMaterial({ color: col, roughness: 0.5, metalness: 0.2 });
  }
}

/**
 * アニメーションループ
 */
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getElapsedTime();

  if (textGroup) {
    // 基本アニメーション
    switch(animMode) {
      case 'rotate': textGroup.rotation.y = delta * 0.5; break;
      case 'float': textGroup.position.y = Math.sin(delta * 1.5) * 0.1; break;
      case 'pulse': 
        const s = parseFloat(document.getElementById('scale').value);
        textGroup.scale.setScalar(s * (1 + Math.sin(delta * 3) * 0.1)); 
        break;
    }

    // ジャイロ追従 (AR感を出すため)
    if (isGyroEnabled) {
      // 簡易的な傾き反映
      textGroup.rotation.x = THREE.MathUtils.lerp(textGroup.rotation.x, THREE.MathUtils.degToRad(gyro.beta - 90) * 0.2, 0.1);
      textGroup.rotation.z = THREE.MathUtils.lerp(textGroup.rotation.z, THREE.MathUtils.degToRad(gyro.gamma) * -0.2, 0.1);
    }
  }

  renderer.render(scene, camera);
}

/**
 * フォントの読み込み
 */
async function loadFont(key) {
  const url = FONT_DEFS[key];
  if (fontCache[key]) {
    opentypeFont = fontCache[key];
    return;
  }
  const response = await fetch(url);
  const buffer = await response.arrayBuffer();
  opentypeFont = opentype.parse(buffer);
  fontCache[key] = opentypeFont;
}

/**
 * UIのセットアップ
 */
function setupUI() {
  const panel = document.getElementById('panel');
  const toggle = document.getElementById('toggle-panel');

  toggle.addEventListener('click', () => panel.classList.toggle('open'));

  document.getElementById('text-input').addEventListener('input', () => updateText());
  document.getElementById('scale').addEventListener('input', () => updateText());
  document.getElementById('color-front').addEventListener('input', () => updateText());

  document.getElementById('font-select').addEventListener('change', async (e) => {
    document.getElementById('status').textContent = "Loading Font...";
    await loadFont(e.target.value);
    updateText();
    document.getElementById('status').textContent = "Ready";
  });

  document.querySelectorAll('[data-mat]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-mat]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      matMode = btn.dataset.mat;
      updateText();
    });
  });

  document.querySelectorAll('[data-anim]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-anim]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      animMode = btn.dataset.anim;
      // 位置と回転のリセット
      textGroup.position.set(0, 0, 0);
      textGroup.rotation.set(0, 0, 0);
    });
  });

  // スタートボタンの処理（ここがAR自動起動のトリガー）
  document.getElementById('start-btn').addEventListener('click', () => {
    startARSystem();
  });
}

/**
 * メインエントリー
 */
async function main() {
  initEngine();
  setupUI();
  animate();

  // 初回フォント読み込み
  try {
    await loadFont('zenold');
    await updateText();
    
    // 準備完了：スタートボタンを表示
    document.getElementById('loader-content').style.display = 'none';
    document.getElementById('start-btn').style.display = 'block';
    document.getElementById('start-hint').style.display = 'block';
  } catch (e) {
    document.getElementById('status').textContent = "Init Error: " + e.message;
  }
}

window.addEventListener('load', main);
</script>
</body>
</html>
