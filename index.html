<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Text Studio - Auto-Update Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FontLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/geometries/TextGeometry.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Inter', 'Noto Sans JP', sans-serif; background-color: #020617; color: #f8fafc; }
        canvas { display: block; outline: none; }
        
        .inspector-panel {
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ui-overlay { position: fixed; z-index: 100; pointer-events: none; }
        .ui-overlay > * { pointer-events: auto; }

        @media (max-width: 767px) {
            .inspector-panel {
                bottom: 0; left: 0; width: 100%; border-left: none;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
                max-height: 55vh; border-radius: 24px 24px 0 0;
            }
            .inspector-panel.minimized { transform: translateY(calc(100% - 60px)); }
        }

        @media (min-width: 768px) {
            .inspector-panel { top: 0; right: 0; width: 340px; height: 100vh; }
            .inspector-panel.minimized { transform: translateX(340px); }
        }

        input, select { background: #111827; color: white; border: 1px solid #374151; border-radius: 10px; padding: 12px; width: 100%; outline: none; font-size: 15px; }
        input:focus { border-color: #6366f1; }
        input[type="range"] { height: 8px; border-radius: 4px; appearance: none; background: #374151; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #6366f1; cursor: pointer; border: 2px solid #fff; box-shadow: 0 0 10px rgba(99,102,241,0.5); }

        #ar-start-btn {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            z-index: 200; padding: 16px 40px;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: #fff; border-radius: 9999px; font-weight: 900;
            text-transform: uppercase; box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
            display: none; border: none; width: 85%; max-width: 300px;
        }

        .minimize-toggle { cursor: pointer; width: 100%; display: flex; flex-direction: column; align-items: center; padding: 12px 0; }
        .handle-bar { width: 40px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }

        #reopen-btn {
            position: fixed; top: 24px; right: 24px; z-index: 110;
            background: #6366f1; width: 48px; height: 48px; border-radius: 14px;
            display: none; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="loading" class="fixed inset-0 bg-slate-950 flex flex-col items-center justify-center z-[300]">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-xs font-black tracking-widest text-slate-500 uppercase italic">リアルタイムエンジン起動中...</p>
    </div>

    <div class="ui-overlay top-6 left-6 hidden md:block">
        <h1 class="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400 tracking-tighter">TEXT AR STUDIO</h1>
        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">リアルタイム・モデラー</p>
    </div>

    <button id="reopen-btn" onclick="toggleInspector()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="18" x2="20" y2="18"></line></svg>
    </button>

    <button id="ar-start-btn" onclick="startAR()">ARを起動して配置する</button>
    <div id="ar-status" class="fixed top-8 left-1/2 -translate-x-1/2 glass-panel px-8 py-3 rounded-full text-xs font-bold hidden z-[150] bg-indigo-600 border border-indigo-400 text-white shadow-2xl">床をスキャンしてください</div>

    <div id="ui-container" class="inspector-panel ui-overlay flex flex-col">
        <div class="minimize-toggle" onclick="toggleInspector()">
            <div class="handle-bar"></div>
            <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest sm:hidden mt-2">スワイプで閉じる</span>
        </div>
        
        <div id="panel-content" class="px-6 pb-10 overflow-y-auto custom-scroll flex-1 space-y-8">
            <section class="space-y-4">
                <h2 class="text-[10px] font-black text-indigo-400 uppercase tracking-widest flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-indigo-400"></span>基本設定
                </h2>
                <div class="space-y-3">
                    <input type="text" id="textInput" placeholder="文字を入力..." maxlength="15" value="TEXT AR" oninput="generateNew()">
                    <select id="renderMode" onchange="generateNew()">
                        <option value="board">パネル文字 (日本語対応)</option>
                        <option value="geometry">3D立体文字 (英数字)</option>
                    </select>
                </div>
            </section>

            <section class="space-y-4">
                <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-slate-500"></span>トランスフォーム（自動更新）
                </h2>
                <div class="space-y-4">
                    <div class="bg-slate-900/60 p-4 rounded-xl border border-slate-800">
                        <div class="flex justify-between mb-2">
                            <span class="text-[10px] text-slate-400 font-bold uppercase">スケール</span>
                            <span id="scaleDisplay" class="text-[10px] font-mono text-indigo-400 font-bold">1.0x</span>
                        </div>
                        <input type="range" id="scaleRange" min="0.1" max="4" step="0.1" value="1" oninput="updateScale(this.value)">
                    </div>
                    <div class="bg-slate-900/60 p-4 rounded-xl border border-slate-800">
                        <div class="flex justify-between mb-2">
                            <span class="text-[10px] text-slate-400 font-bold uppercase">厚み（奥行き）</span>
                            <span id="depthDisplay" class="text-[10px] font-mono text-indigo-400 font-bold">0.2x</span>
                        </div>
                        <input type="range" id="depthRange" min="0.01" max="1.5" step="0.01" value="0.2" oninput="updateDepth(this.value)">
                    </div>
                </div>
            </section>

            <section class="space-y-4">
                <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-slate-500"></span>マテリアル & アニメ
                </h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[9px] text-slate-400 uppercase font-bold">質感プリセット</label>
                        <select id="stylePreset" onchange="applyPreset(this.value)">
                            <option value="custom">標準</option>
                            <option value="neon">ネオン（発光）</option>
                            <option value="metal">メタル（反射）</option>
                            <option value="glass">クリスタル（透過）</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[9px] text-slate-400 uppercase font-bold">動作（アニメ）</label>
                        <select id="animSelect" onchange="updateAnimation(this.value)">
                            <option value="none">なし</option>
                            <option value="rotate">回転</option>
                            <option value="float">浮遊</option>
                            <option value="pulse">脈動</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[9px] text-slate-400 uppercase font-bold">表面の色</label>
                        <input type="color" id="frontColorPicker" value="#ffffff" oninput="updateColors()" class="h-12 cursor-pointer rounded-lg bg-slate-900 border-none w-full p-1">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[9px] text-slate-400 uppercase font-bold">側面の色</label>
                        <input type="color" id="sideColorPicker" value="#6366f1" oninput="updateColors()" class="h-12 cursor-pointer rounded-lg bg-slate-900 border-none w-full p-1">
                    </div>
                </div>
            </section>

            <button onclick="clearScene()" class="w-full py-4 rounded-xl text-[10px] font-black uppercase tracking-widest border border-slate-700 text-slate-500 hover:text-rose-400 hover:border-rose-400 transition-all">
                モデルをリセット
            </button>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, font;
        let objects = [];
        let selectedObject = null;
        let isMinimizing = false;
        const clock = new THREE.Clock();
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let reticle;

        const fontLoader = new THREE.FontLoader();
        const fontUrl = 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/fonts/helvetiker_bold.typeface.json';

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020617);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);
            camera.position.set(1.5, 1.5, 1.5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.1;
            controls.target.set(0, 0.3, 0);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const pointLight = new THREE.PointLight(0xffffff, 1.5);
            pointLight.position.set(5, 10, 5);
            scene.add(pointLight);

            const grid = new THREE.GridHelper(10, 20, 0x1e293b, 0x0f172a);
            grid.name = "grid";
            scene.add(grid);

            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.1, 0.12, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x6366f1, transparent: true, opacity: 0.8 })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            window.addEventListener('resize', onWindowResize);
            
            if ('xr' in navigator) {
                navigator.xr.isSessionSupported('immersive-ar').then(supported => {
                    if (supported) document.getElementById('ar-start-btn').style.display = 'block';
                });
            }

            fontLoader.load(fontUrl, (loadedFont) => {
                font = loadedFont;
                document.getElementById('loading').style.display = 'none';
                generateNew();
            }, undefined, () => {
                document.getElementById('loading').style.display = 'none';
                generateNew(); 
            });
        }

        function toggleInspector() {
            const panel = document.getElementById('ui-container');
            const reopenBtn = document.getElementById('reopen-btn');
            isMinimizing = !isMinimizing;
            if (isMinimizing) {
                panel.classList.add('minimized');
                if (window.innerWidth >= 768) reopenBtn.style.display = 'flex';
            } else {
                panel.classList.remove('minimized');
                reopenBtn.style.display = 'none';
            }
        }

        function fixGeometryPivot(geometry) {
            geometry.computeBoundingBox();
            const bbox = geometry.boundingBox;
            const xOffset = - (bbox.max.x + bbox.min.x) / 2;
            const yOffset = - bbox.min.y; 
            const zOffset = - (bbox.max.z + bbox.min.z) / 2;
            geometry.translate(xOffset, yOffset, zOffset);
        }

        function createTextGeometry(text, depth) {
            const geo = new THREE.TextGeometry(text || "AR", {
                font: font,
                size: 0.3,
                height: depth,
                curveSegments: 12,
                bevelEnabled: true,
                bevelThickness: 0.02,
                bevelSize: 0.01,
                bevelOffset: 0,
                bevelSegments: 5
            });
            fixGeometryPivot(geo);
            return geo;
        }

        function createBoardGeometry(text, depthValue) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1024; canvas.height = 512;
            ctx.clearRect(0,0,1024,512);
            ctx.font = "Bold 160px 'Hiragino Sans', 'Meiryo', sans-serif";
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.strokeStyle = "rgba(0,0,0,0.8)"; ctx.lineWidth = 20;
            ctx.strokeText(text, 512, 256);
            ctx.fillStyle = "white"; ctx.fillText(text, 512, 256);
            
            const tex = new THREE.CanvasTexture(canvas);
            const frontMat = new THREE.MeshStandardMaterial({ map: tex, transparent: true, side: THREE.DoubleSide });
            const sideMat = new THREE.MeshStandardMaterial({ color: document.getElementById('sideColorPicker').value });
            
            const textMetrics = ctx.measureText(text);
            const textWidth = Math.max(0.6, (textMetrics.width / 400));
            const geo = new THREE.BoxGeometry(textWidth, 0.5, depthValue);
            fixGeometryPivot(geo);
            return new THREE.Mesh(geo, [sideMat, sideMat, sideMat, sideMat, frontMat, sideMat]);
        }

        function generateNew() {
            // 現在のトランスフォームとアニメーションを保持
            const oldPos = selectedObject ? selectedObject.position.clone() : new THREE.Vector3(0,0,0);
            const oldRot = selectedObject ? selectedObject.rotation.clone() : new THREE.Euler(0,0,0);
            
            clearScene();
            
            const textStr = document.getElementById('textInput').value || "AR";
            const modeInput = document.getElementById('renderMode').value;
            const depth = parseFloat(document.getElementById('depthRange').value);
            const isJapanese = /[^\x00-\x7F]/.test(textStr);
            const actualMode = isJapanese ? 'board' : modeInput;
            
            if (isJapanese) document.getElementById('renderMode').value = 'board';

            let mesh;
            try {
                if (actualMode === 'geometry' && font) {
                    const geo = createTextGeometry(textStr, depth);
                    const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.5, roughness: 0.2 });
                    mesh = new THREE.Mesh(geo, mat);
                } else {
                    mesh = createBoardGeometry(textStr, depth);
                }

                mesh.userData.type = actualMode;
                mesh.userData.animation = document.getElementById('animSelect').value;
                mesh.userData.baseY = 0;
                mesh.userData.savedScale = parseFloat(document.getElementById('scaleRange').value);
                
                mesh.position.copy(oldPos);
                mesh.rotation.copy(oldRot);
                mesh.scale.set(mesh.userData.savedScale, mesh.userData.savedScale, mesh.scale.z);
                
                scene.add(mesh);
                objects.push(mesh);
                selectedObject = mesh;
                
                // 他のリアルタイム項目も再適用
                updateColors();
                applyPreset(document.getElementById('stylePreset').value);
            } catch (e) { console.error(e); }
        }

        // --- 自動反映機能の実装 ---

        function applyPreset(val) {
            if (!selectedObject) return;
            const mats = Array.isArray(selectedObject.material) ? selectedObject.material : [selectedObject.material];
            mats.forEach(m => {
                switch(val) {
                    case 'neon': m.emissive.set(m.color); m.emissiveIntensity = 2.0; m.metalness = 0; m.roughness = 1; break;
                    case 'metal': m.emissiveIntensity = 0; m.metalness = 1.0; m.roughness = 0.1; break;
                    case 'glass': m.transparent = true; m.opacity = 0.5; m.metalness = 0.2; m.roughness = 0; break;
                    default: m.emissiveIntensity = 0; m.opacity = 1.0; m.metalness = 0.5; m.roughness = 0.4;
                }
            });
        }

        function updateColors() {
            if (!selectedObject) return;
            const frontCol = document.getElementById('frontColorPicker').value;
            const sideCol = document.getElementById('sideColorPicker').value;
            if (Array.isArray(selectedObject.material)) {
                selectedObject.material[4].color.set(frontCol);
                [0,1,2,3,5].forEach(i => selectedObject.material[i].color.set(sideCol));
            } else {
                selectedObject.material.color.set(frontCol);
            }
        }

        function updateDepth(val) {
            document.getElementById('depthDisplay').innerText = val + 'x';
            generateNew(); // 厚みはジオメトリを再構築
        }

        function updateScale(val) {
            if (!selectedObject) return;
            const s = parseFloat(val);
            selectedObject.userData.savedScale = s;
            selectedObject.scale.set(s, s, selectedObject.scale.z);
            document.getElementById('scaleDisplay').innerText = s.toFixed(1) + 'x';
        }

        function updateAnimation(val) {
            if (!selectedObject) return;
            selectedObject.userData.animation = val;
            if (val === 'none') {
                selectedObject.rotation.set(0, 0, 0);
                selectedObject.position.y = 0;
            }
        }

        function clearScene() {
            objects.forEach(o => {
                if(o.geometry) o.geometry.dispose();
                if(Array.isArray(o.material)) o.material.forEach(m => m.dispose());
                else if(o.material) o.material.dispose();
                scene.remove(o);
            });
            objects = [];
            selectedObject = null;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        async function startAR() {
            try {
                const session = await navigator.xr.requestSession('immersive-ar', { requiredFeatures: ['hit-test', 'local-floor'] });
                renderer.xr.setReferenceSpaceType('local-floor');
                await renderer.xr.setSession(session);
                document.getElementById('ui-container').classList.add('minimized');
                isMinimizing = true;
                document.getElementById('ar-start-btn').style.display = 'none';
                document.getElementById('ar-status').style.display = 'block';
                scene.getObjectByName("grid").visible = false;
                session.addEventListener('end', () => {
                    document.getElementById('ui-container').classList.remove('minimized');
                    isMinimizing = false;
                    document.getElementById('ar-start-btn').style.display = 'block';
                    document.getElementById('ar-status').style.display = 'none';
                    scene.getObjectByName("grid").visible = true;
                });
                session.addEventListener('select', () => {
                    if (reticle.visible && selectedObject) {
                        const pos = new THREE.Vector3();
                        reticle.matrix.decompose(pos, new THREE.Quaternion(), new THREE.Vector3());
                        selectedObject.position.x = pos.x;
                        selectedObject.position.z = pos.z;
                        if (selectedObject.userData.animation === 'none') selectedObject.position.y = 0;
                    }
                });
            } catch (e) { alert("ARを起動できませんでした。"); }
        }

        function animate() {
            renderer.setAnimationLoop((timestamp, frame) => {
                const time = clock.getElapsedTime();
                if (selectedObject) {
                    const anim = selectedObject.userData.animation;
                    const baseS = selectedObject.userData.savedScale || 1.0;
                    if (anim === 'rotate') selectedObject.rotation.y += 0.02;
                    else if (anim === 'float') selectedObject.position.y = (Math.sin(time * 2) * 0.1 + 0.1) * selectedObject.scale.y;
                    else if (anim === 'pulse') {
                        const s = baseS + Math.sin(time * 5) * 0.1 * baseS;
                        selectedObject.scale.set(s, s, selectedObject.scale.z);
                    }
                }
                if (frame) {
                    const session = renderer.xr.getSession();
                    const rs = renderer.xr.getReferenceSpace();
                    if (session && !hitTestSourceRequested) {
                        session.requestReferenceSpace('viewer').then(ref => {
                            session.requestHitTestSource({ space: ref }).then(s => hitTestSource = s);
                        });
                        hitTestSourceRequested = true;
                    }
                    if (hitTestSource) {
                        const results = frame.getHitTestResults(hitTestSource);
                        if (results.length) {
                            reticle.visible = true;
                            reticle.matrix.fromArray(results[0].getPose(rs).transform.matrix);
                        } else { reticle.visible = false; }
                    }
                }
                controls.update();
                renderer.render(scene, camera);
            });
        }
    </script>
</body>
</html>
