<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR 3D Modeler - Photo Support</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #1a1a1a; color: white; }
        canvas { display: block; }
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 280px;
            transition: opacity 0.3s;
            max-height: 90vh;
            overflow-y: auto;
        }
        .control-group { margin-bottom: 15px; }
        .btn-tool {
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-tool:hover { transform: translateY(-2px); filter: brightness(1.2); }
        #ar-button {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            padding: 16px 32px;
            background: #3b82f6;
            color: #fff;
            border-radius: 9999px;
            font-weight: bold;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.5);
            display: none;
            border: none;
            cursor: pointer;
        }
        #ar-instructions {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 20px;
            display: none;
            z-index: 100;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="ui-container" class="ui-panel">
        <h1 class="text-xl font-bold mb-4 border-b border-gray-700 pb-2">AR 3D モデラー</h1>
        
        <div class="control-group">
            <p class="text-xs uppercase text-gray-400 mb-2 font-semibold">オブジェクト追加</p>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="addObject('box')" class="btn-tool bg-gray-700 p-2 rounded text-sm">📦 立方体</button>
                <button onclick="addObject('sphere')" class="btn-tool bg-gray-700 p-2 rounded text-sm">🔮 球体</button>
                <button onclick="addObject('cylinder')" class="btn-tool bg-gray-700 p-2 rounded text-sm">🔋 円柱</button>
                <button onclick="addObject('torus')" class="btn-tool bg-gray-700 p-2 rounded text-sm">🍩 ドーナツ</button>
            </div>
            
            <div class="mt-3">
                <p class="text-xs uppercase text-gray-400 mb-2 font-semibold">写真を取り込む</p>
                <input type="file" id="photoInput" accept="image/*" class="hidden" onchange="handlePhotoUpload(event)">
                <button onclick="document.getElementById('photoInput').click()" class="w-full btn-tool bg-blue-600 hover:bg-blue-500 p-2 rounded text-sm font-bold">
                    📷 写真を追加
                </button>
            </div>
        </div>

        <div id="edit-panel" class="hidden border-t border-gray-700 pt-4 mt-4">
            <p class="text-xs uppercase text-gray-400 mb-2 font-semibold">選択中の編集</p>
            <div class="space-y-3">
                <div id="color-editor">
                    <label class="text-xs block mb-1">カラー / フィルタ</label>
                    <input type="color" id="colorPicker" oninput="updateColor(this.value)" class="w-full h-8 rounded cursor-pointer bg-transparent">
                </div>
                <div>
                    <label class="text-xs block mb-1">サイズ</label>
                    <input type="range" min="0.1" max="5" step="0.1" value="1" oninput="updateScale(this.value)" class="w-full">
                </div>
                <button onclick="removeSelected()" class="w-full bg-red-600 hover:bg-red-500 py-2 rounded text-sm font-bold transition">削除</button>
            </div>
        </div>

        <div class="mt-6">
            <button onclick="clearScene()" class="w-full border border-gray-600 hover:bg-gray-800 py-2 rounded text-sm transition text-gray-300">すべてクリア</button>
        </div>
    </div>

    <div id="ar-instructions">床をゆっくりスキャンしてください...</div>
    <button id="ar-button">ARを起動して床に置く</button>

    <script>
        let scene, camera, renderer, controls;
        let objects = [];
        let selectedObject = null;
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();

        // AR related
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let reticle;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(2, 2, 2);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 10, 5);
            scene.add(directionalLight);

            // Grid for Editor
            const gridHelper = new THREE.GridHelper(10, 10, 0x444444, 0x222222);
            gridHelper.name = "editorGrid";
            scene.add(gridHelper);

            // AR Reticle
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.15, 0.2, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0xffffff })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('pointerdown', onPointerDown);

            // AR Button setup
            if ('xr' in navigator) {
                navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
                    if (supported) {
                        const arBtn = document.getElementById('ar-button');
                        arBtn.style.display = 'block';
                        arBtn.onclick = startAR;
                    }
                });
            }
        }

        function addObject(type) {
            let geometry;
            switch(type) {
                case 'box': geometry = new THREE.BoxGeometry(0.3, 0.3, 0.3); break;
                case 'sphere': geometry = new THREE.SphereGeometry(0.2, 32, 32); break;
                case 'cylinder': geometry = new THREE.CylinderGeometry(0.15, 0.15, 0.3, 32); break;
                case 'torus': geometry = new THREE.TorusGeometry(0.15, 0.05, 16, 100); break;
            }

            const material = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.userData.type = 'shape';
            
            mesh.position.set(0, 0.15, 0);
            scene.add(mesh);
            objects.push(mesh);
            selectObject(mesh);
        }

        function handlePhotoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const textureLoader = new THREE.TextureLoader();
                textureLoader.load(e.target.result, (texture) => {
                    const img = texture.image;
                    const aspect = img.width / img.height;
                    
                    // Standard height 0.5m in AR
                    const h = 0.5;
                    const w = h * aspect;

                    const geometry = new THREE.PlaneGeometry(w, h);
                    const material = new THREE.MeshStandardMaterial({ 
                        map: texture, 
                        side: THREE.DoubleSide,
                        transparent: true
                    });
                    
                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.userData.type = 'photo';
                    mesh.userData.originalAspect = aspect;
                    
                    // Stand up vertically
                    mesh.position.set(0, h/2, 0);
                    
                    scene.add(mesh);
                    objects.push(mesh);
                    selectObject(mesh);
                });
            };
            reader.readAsDataURL(file);
        }

        function onPointerDown(event) {
            if (renderer.xr.isPresenting) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objects);

            if (intersects.length > 0) {
                selectObject(intersects[0].object);
            } else {
                deselectObject();
            }
        }

        function selectObject(obj) {
            deselectObject();
            selectedObject = obj;
            document.getElementById('edit-panel').classList.remove('hidden');
            document.getElementById('colorPicker').value = '#' + obj.material.color.getHexString();
            
            // Add outline
            let outlineGeo;
            if (obj.userData.type === 'photo') {
                outlineGeo = new THREE.EdgesGeometry(obj.geometry);
            } else {
                outlineGeo = new THREE.EdgesGeometry(obj.geometry);
            }
            const line = new THREE.LineSegments(outlineGeo, new THREE.LineBasicMaterial({ color: 0x3b82f6 }));
            line.name = "selectionOutline";
            obj.add(line);
        }

        function deselectObject() {
            if (selectedObject) {
                const outline = selectedObject.getObjectByName("selectionOutline");
                if (outline) selectedObject.remove(outline);
            }
            selectedObject = null;
            document.getElementById('edit-panel').classList.add('hidden');
        }

        function updateColor(hex) {
            if (selectedObject) {
                selectedObject.material.color.set(hex);
            }
        }

        function updateScale(val) {
            if (selectedObject) {
                const s = parseFloat(val);
                selectedObject.scale.set(s, s, s);
            }
        }

        function removeSelected() {
            if (selectedObject) {
                scene.remove(selectedObject);
                objects = objects.filter(o => o !== selectedObject);
                deselectObject();
            }
        }

        function clearScene() {
            objects.forEach(obj => scene.remove(obj));
            objects = [];
            deselectObject();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        async function startAR() {
            const sessionInit = { requiredFeatures: ['hit-test'] };
            const session = await navigator.xr.requestSession('immersive-ar', sessionInit);
            
            renderer.xr.setReferenceSpaceType('local');
            await renderer.xr.setSession(session);

            document.getElementById('ui-container').style.opacity = '0';
            document.getElementById('ui-container').style.pointerEvents = 'none';
            document.getElementById('ar-button').style.display = 'none';
            document.getElementById('ar-instructions').style.display = 'block';
            
            const grid = scene.getObjectByName("editorGrid");
            if (grid) grid.visible = false;

            session.addEventListener('end', () => {
                hitTestSourceRequested = false;
                hitTestSource = null;
                reticle.visible = false;
                document.getElementById('ui-container').style.opacity = '1';
                document.getElementById('ui-container').style.pointerEvents = 'auto';
                document.getElementById('ar-button').style.display = 'block';
                document.getElementById('ar-instructions').style.display = 'none';
                if (grid) grid.visible = true;
            });

            session.addEventListener('select', () => {
                if (reticle.visible) {
                    if (selectedObject) {
                        const pos = new THREE.Vector3();
                        const quat = new THREE.Quaternion();
                        const scale = new THREE.Vector3();
                        reticle.matrix.decompose(pos, quat, scale);
                        
                        // Set position but keep vertical if it's a photo
                        selectedObject.position.copy(pos);
                        if (selectedObject.userData.type === 'photo') {
                            // Adjust Y so it sits on the floor
                            const h = 0.5 * selectedObject.scale.y;
                            selectedObject.position.y += h;
                        }
                    }
                }
            });
        }

        function animate() {
            renderer.setAnimationLoop((timestamp, frame) => {
                if (frame) {
                    const referenceSpace = renderer.xr.getReferenceSpace();
                    const session = renderer.xr.getSession();

                    if (hitTestSourceRequested === false) {
                        session.requestReferenceSpace('viewer').then((referenceSpace) => {
                            session.requestHitTestSource({ space: referenceSpace }).then((source) => {
                                hitTestSource = source;
                            });
                        });
                        hitTestSourceRequested = true;
                    }

                    if (hitTestSource) {
                        const hitTestResults = frame.getHitTestResults(hitTestSource);
                        if (hitTestResults.length) {
                            const hit = hitTestResults[0];
                            reticle.visible = true;
                            reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                            document.getElementById('ar-instructions').innerText = "タップして写真を配置";
                        } else {
                            reticle.visible = false;
                            document.getElementById('ar-instructions').innerText = "床を探しています...";
                        }
                    }
                }

                if (!renderer.xr.isPresenting) {
                    controls.update();
                }
                
                renderer.render(scene, camera);
            });
        }
    </script>
</body>
</html>
