<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TEXT AR STUDIO - 日本語3D対応版</title>
<style>
  :root {
    --bg: #0a0a0f;
    --panel: rgba(15,15,25,0.92);
    --border: rgba(100,180,255,0.18);
    --accent: #4af;
    --accent2: #f4a;
    --text: #e8eaf0;
    --sub: #6a7a9a;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    overflow: hidden;
    height: 100dvh;
    width: 100vw;
  }

  /* THREE.js canvas */
  #three-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ローディング */
  #loading {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    transition: opacity 0.6s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .loader-ring {
    width: 52px; height: 52px;
    border: 3px solid rgba(68,170,255,0.15);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: var(--sub); font-size: 13px; letter-spacing: 0.1em; }

  /* コントロールパネル */
  #panel {
    position: fixed;
    right: 0; top: 0; bottom: 0;
    width: 300px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    backdrop-filter: blur(20px);
    overflow-y: auto;
    z-index: 10;
    padding: 20px 16px 40px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    transition: transform 0.3s ease;
  }
  #panel::-webkit-scrollbar { width: 4px; }
  #panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .panel-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .field-label {
    font-size: 11px;
    color: var(--sub);
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
  .field { display: flex; flex-direction: column; gap: 6px; }

  textarea, input[type=text], input[type=range], select {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    padding: 10px 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus, input[type=text]:focus, select:focus {
    border-color: var(--accent);
  }
  textarea { resize: none; height: 80px; line-height: 1.6; }

  input[type=range] {
    padding: 0;
    border: none;
    background: transparent;
    -webkit-appearance: none;
    height: 4px;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-runnable-track {
    background: rgba(68,170,255,0.2);
    border-radius: 4px;
    height: 4px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    background: var(--accent);
    border-radius: 50%;
    margin-top: -6px;
    box-shadow: 0 0 8px rgba(68,170,255,0.6);
  }

  .range-row {
    display: flex; align-items: center; gap: 8px;
  }
  .range-val {
    font-size: 12px; color: var(--accent);
    min-width: 36px; text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* プリセットボタン */
  .preset-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .preset-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 12px;
    padding: 8px 6px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    font-family: inherit;
  }
  .preset-btn:hover, .preset-btn.active {
    background: rgba(68,170,255,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* カラー */
  .color-row { display: flex; gap: 10px; }
  .color-field { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  input[type=color] {
    width: 100%; height: 36px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    cursor: pointer;
    padding: 2px;
  }

  /* 生成ボタン */
  #gen-btn {
    background: linear-gradient(135deg, #1a6fff, #0af);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    padding: 14px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(68,170,255,0.3);
    position: relative;
    overflow: hidden;
  }
  #gen-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(68,170,255,0.45); }
  #gen-btn:active { transform: translateY(0); }
  #gen-btn.loading { pointer-events: none; opacity: 0.7; }
  #gen-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.1);
    transform: translateX(-100%);
    transition: transform 0.3s;
  }
  #gen-btn:hover::after { transform: translateX(100%); }

  /* リセット */
  #reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--sub);
    font-size: 13px;
    font-family: inherit;
    padding: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  #reset-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ステータスバー */
  #status {
    position: fixed;
    bottom: 16px; left: 50%;
    transform: translateX(-50%);
    background: rgba(15,15,25,0.85);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 8px 20px;
    font-size: 12px;
    color: var(--sub);
    backdrop-filter: blur(16px);
    z-index: 10;
    letter-spacing: 0.08em;
    transition: all 0.3s;
    white-space: nowrap;
  }
  #status.ok { color: var(--accent); border-color: rgba(68,170,255,0.35); }
  #status.err { color: #f66; border-color: rgba(255,100,100,0.35); }

  /* パネル開閉（モバイル） */
  #toggle-panel {
    display: none;
    position: fixed;
    top: 16px; right: 16px;
    z-index: 20;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 20px;
    width: 44px; height: 44px;
    align-items: center; justify-content: center;
    cursor: pointer;
  }
  @media (max-width: 640px) {
    #panel { width: 100%; transform: translateX(100%); }
    #panel.open { transform: translateX(0); }
    #toggle-panel { display: flex; }
  }

  /* フォントエラー警告 */
  #font-warn {
    font-size: 11px;
    color: #f96;
    padding: 8px 10px;
    background: rgba(255,150,80,0.08);
    border: 1px solid rgba(255,150,80,0.2);
    border-radius: 8px;
    display: none;
  }

  /* ヘッダーロゴ */
  #logo {
    position: fixed;
    top: 16px; left: 20px;
    z-index: 10;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="loader-ring"></div>
  <p>エンジン起動中 / フォント読み込み中…</p>
</div>

<canvas id="three-canvas"></canvas>
<div id="logo">TEXT AR STUDIO</div>

<button id="toggle-panel">☰</button>

<div id="panel">
  <div class="panel-title">テキスト設定</div>

  <div class="field">
    <div class="field-label">テキスト（日本語・英数字対応）</div>
    <textarea id="text-input" placeholder="日本語・English&#10;どちらも3D化できます">日本語</textarea>
    <div id="font-warn">⚠ フォント読み込みに失敗しました。日本語が表示できない場合があります。</div>
  </div>

  <div class="panel-title">トランスフォーム</div>

  <div class="field">
    <div class="field-label">スケール</div>
    <div class="range-row">
      <input type="range" id="scale" min="0.2" max="3" step="0.05" value="1">
      <span class="range-val" id="scale-val">1.0x</span>
    </div>
  </div>

  <div class="field">
    <div class="field-label">厚み（押し出し深度）</div>
    <div class="range-row">
      <input type="range" id="depth" min="0.01" max="1" step="0.01" value="0.2">
      <span class="range-val" id="depth-val">0.2</span>
    </div>
  </div>

  <div class="field">
    <div class="field-label">ベベル（角の丸み）</div>
    <div class="range-row">
      <input type="range" id="bevel" min="0" max="0.08" step="0.002" value="0.02">
      <span class="range-val" id="bevel-val">0.02</span>
    </div>
  </div>

  <div class="panel-title">マテリアル & アニメ</div>

  <div class="field">
    <div class="field-label">質感プリセット</div>
    <div class="preset-grid">
      <button class="preset-btn active" data-mat="standard">標準</button>
      <button class="preset-btn" data-mat="neon">ネオン（発光）</button>
      <button class="preset-btn" data-mat="metal">メタル（反射）</button>
      <button class="preset-btn" data-mat="crystal">クリスタル（透過）</button>
    </div>
  </div>

  <div class="field">
    <div class="field-label">アニメーション</div>
    <div class="preset-grid">
      <button class="preset-btn active" data-anim="none">なし</button>
      <button class="preset-btn" data-anim="rotate">回転</button>
      <button class="preset-btn" data-anim="float">浮遊</button>
      <button class="preset-btn" data-anim="pulse">脈動</button>
    </div>
  </div>

  <div class="field">
    <div class="field-label">カラー</div>
    <div class="color-row">
      <div class="color-field">
        <div class="field-label">表面</div>
        <input type="color" id="color-front" value="#44aaff">
      </div>
      <div class="color-field">
        <div class="field-label">側面</div>
        <input type="color" id="color-side" value="#0033aa">
      </div>
    </div>
  </div>

  <button id="gen-btn">▶ 3D生成 / 更新</button>
  <button id="reset-btn">↺ リセット</button>
</div>

<div id="status">フォント読み込み中…</div>

<!-- ライブラリ読み込み -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ===== opentype.js CDN読み込み =====
(function() {
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js';
  document.head.appendChild(s);
})();
</script>
<script>
// ===== グローバル変数 =====
let opentypeFont = null;
let scene, camera, renderer, textGroup;
let animMode = 'none';
let matMode = 'standard';
let clock;
let animId;

// ===== Three.js 初期化 =====
function initThree() {
  const canvas = document.getElementById('three-canvas');
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a0f);

  // カメラ
  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
  camera.position.set(0, 0, 5);

  // ライト
  const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambLight);

  const dirLight = new THREE.DirectionalLight(0x88ccff, 1.2);
  dirLight.position.set(3, 5, 5);
  scene.add(dirLight);

  const rimLight = new THREE.DirectionalLight(0xff44aa, 0.6);
  rimLight.position.set(-4, -2, -3);
  scene.add(rimLight);

  // グリッド背景
  const gridHelper = new THREE.GridHelper(40, 40, 0x1a2030, 0x111820);
  gridHelper.position.y = -2;
  scene.add(gridHelper);

  // テキストグループ
  textGroup = new THREE.Group();
  scene.add(textGroup);

  clock = new THREE.Clock();

  // リサイズ
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // マウス/タッチでの簡易オービット
  setupOrbit();
  animate();
}

// ===== 簡易オービット =====
function setupOrbit() {
  let isDragging = false;
  let prevX = 0, prevY = 0;
  let rotX = 0.1, rotY = 0;

  const onStart = e => {
    isDragging = true;
    const p = e.touches ? e.touches[0] : e;
    prevX = p.clientX; prevY = p.clientY;
  };
  const onMove = e => {
    if (!isDragging) return;
    const p = e.touches ? e.touches[0] : e;
    const dx = (p.clientX - prevX) * 0.008;
    const dy = (p.clientY - prevY) * 0.008;
    rotY += dx; rotX += dy;
    rotX = Math.max(-1.2, Math.min(1.2, rotX));
    if (textGroup && animMode === 'none') {
      textGroup.rotation.y = rotY;
      textGroup.rotation.x = rotX;
    }
    prevX = p.clientX; prevY = p.clientY;
  };
  const onEnd = () => { isDragging = false; };

  renderer.domElement.addEventListener('mousedown', onStart);
  renderer.domElement.addEventListener('mousemove', onMove);
  renderer.domElement.addEventListener('mouseup', onEnd);
  renderer.domElement.addEventListener('touchstart', onStart, { passive: true });
  renderer.domElement.addEventListener('touchmove', onMove, { passive: true });
  renderer.domElement.addEventListener('touchend', onEnd);
}

// ===== アニメーションループ =====
function animate() {
  animId = requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  if (textGroup) {
    switch(animMode) {
      case 'rotate':
        textGroup.rotation.y = t * 0.8;
        break;
      case 'float':
        textGroup.position.y = Math.sin(t * 1.2) * 0.25;
        break;
      case 'pulse':
        const s = 1 + Math.sin(t * 2.5) * 0.08;
        textGroup.scale.setScalar(s * parseFloat(document.getElementById('scale').value));
        break;
    }
  }
  renderer.render(scene, camera);
}

// ===== opentype.js → Three.js Shapes変換 =====
function opentypePathToThreeShapes(font, text, fontSize) {
  const allShapes = [];

  // 文字を1文字ずつ処理してX方向にレイアウト
  let xOffset = 0;
  const charSize = fontSize;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];

    // 改行処理
    if (char === '\n') {
      xOffset = 0;
      continue;
    }

    const glyphs = font.stringToGlyphs(char);
    if (!glyphs || glyphs.length === 0) continue;

    for (const glyph of glyphs) {
      if (!glyph.path || glyph.path.commands.length === 0) {
        // スペース等
        xOffset += (glyph.advanceWidth / font.unitsPerEm) * charSize;
        continue;
      }

      // SVGパス文字列を取得
      const svgPath = glyph.path.toSVG(1);
      const shapes = svgPathToShapes(svgPath, font.unitsPerEm, charSize);

      shapes.forEach(shape => {
        // Y軸反転 + X方向オフセット
        shape.curves.forEach(curve => {
          transformPoints(curve, xOffset, font, charSize);
        });
        shape.getPoints().forEach(pt => {
          pt.x += xOffset;
          pt.y = -pt.y + charSize;
        });

        // Three.js Shapeを正しく再構築
        const fixedShape = rebuildShape(glyph, font, charSize, xOffset);
        if (fixedShape) allShapes.push(...fixedShape);
      });

      xOffset += (glyph.advanceWidth / font.unitsPerEm) * charSize;
    }
  }

  return allShapes;
}

// ===== opentype glyph → Three.Shape（確実な変換） =====
function glyphsToShapes(font, text, fontSize) {
  const scale = fontSize / font.unitsPerEm;
  const shapes = [];

  // 全文字のパスを取得
  const path = font.getPath(text, 0, 0, fontSize);
  const commands = path.commands;

  let currentShape = null;
  let currentPath = null;

  for (let i = 0; i < commands.length; i++) {
    const cmd = commands[i];

    if (cmd.type === 'M') {
      // 新しい輪郭開始
      currentShape = new THREE.Shape();
      currentPath = currentShape;
      currentShape.moveTo(cmd.x, -cmd.y); // Y軸反転
      shapes.push(currentShape);

    } else if (cmd.type === 'L') {
      if (currentPath) currentPath.lineTo(cmd.x, -cmd.y);

    } else if (cmd.type === 'C') {
      if (currentPath) currentPath.bezierCurveTo(
        cmd.x1, -cmd.y1,
        cmd.x2, -cmd.y2,
        cmd.x, -cmd.y
      );

    } else if (cmd.type === 'Q') {
      if (currentPath) currentPath.quadraticCurveTo(
        cmd.x1, -cmd.y1,
        cmd.x, -cmd.y
      );

    } else if (cmd.type === 'Z') {
      if (currentPath) currentPath.closePath();
    }
  }

  // ホール検出（文字の内側の穴）
  const resolvedShapes = resolveHoles(shapes);
  return resolvedShapes;
}

// ===== ホール（穴）検出・解決 =====
function resolveHoles(shapes) {
  if (shapes.length <= 1) return shapes;

  // 各シェイプの面積（符号付き）で外側・内側を判定
  const result = [];
  const areas = shapes.map(s => getShapeArea(s));

  // 面積が正 → 外側輪郭、負 → 内側（ホール）
  const outers = [];
  const holes = [];

  shapes.forEach((s, i) => {
    if (areas[i] >= 0) outers.push(s);
    else holes.push(s);
  });

  // ホールを最も近い外側シェイプに割り当て
  outers.forEach(outer => {
    const outerShape = new THREE.Shape(outer.getPoints());
    holes.forEach(hole => {
      // ホールをShapeのholes配列に追加
      const holePath = new THREE.Path(hole.getPoints());
      outerShape.holes.push(holePath);
    });
    result.push(outerShape);
  });

  return result.length > 0 ? result : shapes;
}

function getShapeArea(shape) {
  const pts = shape.getPoints(12);
  let area = 0;
  for (let i = 0; i < pts.length; i++) {
    const j = (i + 1) % pts.length;
    area += pts[i].x * pts[j].y;
    area -= pts[j].x * pts[i].y;
  }
  return area / 2;
}

// ===== メイン：テキスト3D生成 =====
async function generate3DText() {
  if (!opentypeFont) {
    setStatus('フォントがまだ読み込まれていません…', 'err');
    return;
  }

  const btn = document.getElementById('gen-btn');
  btn.textContent = '生成中…';
  btn.classList.add('loading');

  // 少し待ってからUIをブロックしないように
  await new Promise(r => setTimeout(r, 30));

  try {
    const text = document.getElementById('text-input').value || '日本語';
    const scale = parseFloat(document.getElementById('scale').value);
    const depth = parseFloat(document.getElementById('depth').value);
    const bevel = parseFloat(document.getElementById('bevel').value);
    const colorFront = document.getElementById('color-front').value;
    const colorSide = document.getElementById('color-side').value;

    // 既存テキストを削除
    while (textGroup.children.length > 0) {
      const child = textGroup.children[0];
      if (child.geometry) child.geometry.dispose();
      if (child.material) {
        if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
        else child.material.dispose();
      }
      textGroup.remove(child);
    }
    textGroup.scale.setScalar(1);
    textGroup.position.set(0, 0, 0);
    textGroup.rotation.set(0, 0, 0);

    // フォントサイズ（Three.js単位）
    const fontSize = 1.0;

    // opentype.js でシェイプ生成
    const shapes = glyphsToShapes(opentypeFont, text, fontSize);

    if (!shapes || shapes.length === 0) {
      throw new Error('文字シェイプを生成できませんでした');
    }

    // ExtrudeGeometry で押し出し
    const extrudeSettings = {
      depth: depth * fontSize,
      bevelEnabled: bevel > 0,
      bevelThickness: bevel * fontSize,
      bevelSize: bevel * fontSize * 0.5,
      bevelSegments: 4,
      curveSegments: 8,
    };

    // マテリアル作成
    const materials = createMaterials(colorFront, colorSide, matMode);

    // 全シェイプを一度に押し出し
    const geometry = new THREE.ExtrudeGeometry(shapes, extrudeSettings);
    geometry.computeBoundingBox();
    const bbox = geometry.boundingBox;

    // 中央揃え
    const cx = (bbox.max.x + bbox.min.x) / 2;
    const cy = (bbox.max.y + bbox.min.y) / 2;
    const cz = (bbox.max.z + bbox.min.z) / 2;
    geometry.translate(-cx, -cy, -cz);

    const mesh = new THREE.Mesh(geometry, materials);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    textGroup.add(mesh);

    // スケール適用
    textGroup.scale.setScalar(scale * 1.5);

    setStatus('✓ 3D生成完了！ドラッグで回転できます', 'ok');
  } catch (e) {
    console.error(e);
    setStatus('⚠ 生成エラー: ' + e.message, 'err');
  }

  btn.textContent = '▶ 3D生成 / 更新';
  btn.classList.remove('loading');
}

// ===== マテリアル生成 =====
function createMaterials(colorFront, colorSide, mode) {
  const fc = new THREE.Color(colorFront);
  const sc = new THREE.Color(colorSide);

  let frontMat, sideMat;

  switch (mode) {
    case 'neon':
      frontMat = new THREE.MeshStandardMaterial({
        color: fc, emissive: fc, emissiveIntensity: 0.8,
        roughness: 0.2, metalness: 0.1,
      });
      sideMat = new THREE.MeshStandardMaterial({
        color: sc, emissive: sc, emissiveIntensity: 0.5,
        roughness: 0.3,
      });
      break;
    case 'metal':
      frontMat = new THREE.MeshStandardMaterial({
        color: fc, roughness: 0.1, metalness: 0.9,
        envMapIntensity: 1.0,
      });
      sideMat = new THREE.MeshStandardMaterial({
        color: sc, roughness: 0.15, metalness: 0.85,
      });
      break;
    case 'crystal':
      frontMat = new THREE.MeshPhysicalMaterial({
        color: fc, roughness: 0.0, metalness: 0.0,
        transmission: 0.6, transparent: true, opacity: 0.7,
        ior: 1.5,
      });
      sideMat = new THREE.MeshPhysicalMaterial({
        color: sc, roughness: 0.0,
        transmission: 0.4, transparent: true, opacity: 0.6,
      });
      break;
    default: // standard
      frontMat = new THREE.MeshStandardMaterial({
        color: fc, roughness: 0.4, metalness: 0.3,
      });
      sideMat = new THREE.MeshStandardMaterial({
        color: sc, roughness: 0.5, metalness: 0.2,
      });
  }

  return [frontMat, sideMat];
}

// ===== フォント読み込み（Google Fonts API経由のOTF） =====
async function loadFont() {
  setStatus('フォント読み込み中…');

  // 複数のフォールバックURLを試す
  const fontUrls = [
    // Noto Sans JP (サブセット・軽量版)
    'https://fonts.gstatic.com/s/notosansjp/v52/-F6jfjtqLzI2JPCgQBnw7HFyzSD-AsregP8VFBEi75vY0rw-oME.woff2',
    // M PLUS Rounded 1c (日本語対応・軽量)
    'https://fonts.gstatic.com/s/mplusrounded1c/v15/VdGBAYIAV6gnpUpoWwNkYvrugw9RuM0q5AvkmQa1AA.woff2',
  ];

  // opentype.jsが読み込まれるまで待機
  let retry = 0;
  while (typeof opentype === 'undefined' && retry < 50) {
    await new Promise(r => setTimeout(r, 100));
    retry++;
  }

  if (typeof opentype === 'undefined') {
    document.getElementById('font-warn').style.display = 'block';
    setStatus('⚠ opentype.js 読み込み失敗', 'err');
    return false;
  }

  // OTF/TTFを直接フェッチして読み込む
  // CORSの制限があるためGoogleのAPIを使用
  const ttfUrl = 'https://fonts.gstatic.com/s/notosansjp/v52/-F6jfjtqLzI2JPCgQBnw7HFyzSD-AsregP8VFBEi75vY0rw-oME.woff2';

  // woff2はopentype.jsで直接読めないため、別アプローチ
  // Google Fonts CSS APIからフォントURLを取得
  return await loadFontFallback();
}

async function loadFontFallback() {
  // opentype.jsはTTF/OTFのバイナリを直接読む
  // CORS対応しているフォントのみ使用可能

  const candidates = [
    {
      name: 'Noto Sans 1p',
      url: './fonts/NotoSansJP-Regular.ttf'
    },
    {
      name: 'Noto Sans JP',
      url: 'https://cdn.jsdelivr.net/npm/@fontsource/noto-sans-jp@4.5.12/files/noto-sans-jp-japanese-400-normal.woff2'
    }
  ];

  for (const candidate of candidates) {
    try {
      setStatus(`フォント読み込み中: ${candidate.name}…`);
      const font = await new Promise((resolve, reject) => {
        opentype.load(candidate.url, (err, font) => {
          if (err) reject(err);
          else resolve(font);
        });
      });
      opentypeFont = font;
      setStatus(`✓ ${candidate.name} 読み込み完了`, 'ok');
      return true;
    } catch (e) {
      console.warn(`Failed to load ${candidate.name}:`, e);
    }
  }

  // 最終フォールバック：jsDelivr経由
  try {
    setStatus('フォント読み込み中（代替）…');
    const font = await new Promise((resolve, reject) => {
      opentype.load(
        'https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/test/fonts/Roboto-Black.ttf',
        (err, font) => { if (err) reject(err); else resolve(font); }
      );
    });
    opentypeFont = font;
    setStatus('ℹ 英字フォントで動作中（日本語フォントの読み込みに失敗）', '');
    document.getElementById('font-warn').style.display = 'block';
    return true;
  } catch (e) {
    document.getElementById('font-warn').style.display = 'block';
    setStatus('⚠ フォント読み込み失敗', 'err');
    return false;
  }
}

// ===== UI イベント =====
function setupUI() {
  // スライダー
  const sliders = [
    { id: 'scale', valId: 'scale-val', suffix: 'x', decimals: 2 },
    { id: 'depth', valId: 'depth-val', suffix: '', decimals: 2 },
    { id: 'bevel', valId: 'bevel-val', suffix: '', decimals: 3 },
  ];
  sliders.forEach(({ id, valId, suffix, decimals }) => {
    const el = document.getElementById(id);
    const valEl = document.getElementById(valId);
    el.addEventListener('input', () => {
      valEl.textContent = parseFloat(el.value).toFixed(decimals) + suffix;
    });
  });

  // マテリアルプリセット
  document.querySelectorAll('[data-mat]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-mat]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      matMode = btn.dataset.mat;
    });
  });

  // アニメプリセット
  document.querySelectorAll('[data-anim]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-anim]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      animMode = btn.dataset.anim;
      if (animMode === 'none' && textGroup) {
        textGroup.position.y = 0;
        textGroup.scale.setScalar(parseFloat(document.getElementById('scale').value) * 1.5);
      }
    });
  });

  // 生成ボタン
  document.getElementById('gen-btn').addEventListener('click', generate3DText);

  // Enterキーでも生成（Shift+Enterで改行）
  document.getElementById('text-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      generate3DText();
    }
  });

  // リセット
  document.getElementById('reset-btn').addEventListener('click', () => {
    while (textGroup.children.length > 0) {
      textGroup.remove(textGroup.children[0]);
    }
    textGroup.rotation.set(0, 0, 0);
    textGroup.position.set(0, 0, 0);
    document.getElementById('text-input').value = '日本語';
    setStatus('リセットしました');
  });

  // パネル開閉（モバイル）
  document.getElementById('toggle-panel').addEventListener('click', () => {
    document.getElementById('panel').classList.toggle('open');
  });
}

async function main() {
  initThree();
  setupUI();

  const ok = await loadFont();

  // ローディング非表示
  const loading = document.getElementById('loading');

  setTimeout(() => loading.style.display = 'none', 700);

  if (ok && opentypeFont) {
    // 初期テキストを自動生成
    await generate3DText();
  }
}

window.addEventListener('load', main);
